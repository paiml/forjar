# PMAT Quality Gates Configuration for forjar
# Rust-native Infrastructure as Code

[gates]
# Run clippy linter
run_clippy = true

# Enforce strict clippy (-D warnings)
clippy_strict = true

# Run test suite
run_tests = true

# Test timeout in seconds
test_timeout = 600

# Check code coverage
check_coverage = true

# Minimum coverage percentage (target: 95%)
min_coverage = 95.0

# Check cyclomatic complexity
check_complexity = true

# Maximum cyclomatic complexity per function
max_complexity = 20

[quality]
coverage_threshold = 95.0
max_complexity = 20
max_binary_size_mb = 50

[exclude]
patterns = [
    "**/target/**",
]

[hooks]
pre_commit = ["pmat comply check --failures-only"]
