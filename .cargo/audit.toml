# cargo-audit configuration for forjar.
#
# cargo-audit is a separate tool from cargo-deny. `cargo deny check` reads
# `deny.toml` for `[advisories].ignore`; `cargo audit` reads this file for
# `[advisories].ignore`. Both tools run in .github/workflows/audit.yml, so
# any exemption list must be kept in sync across the two files.
#
# See deny.toml (root) for the cargo-deny equivalent.

[advisories]
# Unmaintained transitive deps with no available fix. Reviewed 2026-03-26
# and 2026-04-24 — all are deep transitives, no direct usage.
ignore = [
    "RUSTSEC-2024-0384",  # instant: transitive via web-time, no replacement
    "RUSTSEC-2024-0436",  # paste: transitive via simba/nalgebra/parquet
    "RUSTSEC-2025-0119",  # number_prefix: transitive via indicatif
    "RUSTSEC-2025-0134",  # rustls-pemfile: transitive, no safe upgrade
    "RUSTSEC-2025-0141",  # bincode: transitive, widely used, no drop-in replacement
    "RUSTSEC-2026-0002",  # lru 0.12.5: transitive via ratatui pins 0.12
    "RUSTSEC-2026-0097",  # rustls-webpki: transitive via rustls, same class as -0104
    "RUSTSEC-2026-0104",  # rustls-webpki 0.103.12: reachable panic in CRL parsing, transitive
]
