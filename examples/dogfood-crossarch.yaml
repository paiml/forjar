# Dogfood config: test cross-architecture resource filtering.
#
# Demonstrates arch-aware resource targeting — resources with an
# `arch:` filter are only applied to machines with matching architecture.
#
# Prerequisites:
#   docker build -t forjar-test-target -f tests/Dockerfile.test-target .
#
# Usage:
#   cargo run -- plan -f examples/dogfood-crossarch.yaml --state-dir /tmp/dogfood-crossarch -v
#   cargo run -- validate -f examples/dogfood-crossarch.yaml

version: "1.0"
name: dogfood-crossarch

machines:
  x86-box:
    hostname: x86-box
    addr: container
    transport: container
    arch: x86_64
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-crossarch-x86
      ephemeral: false
      init: true

  arm-box:
    hostname: arm-box
    addr: container
    transport: container
    arch: aarch64
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-crossarch-arm
      ephemeral: false
      init: true

resources:
  # Applied to both architectures (no arch filter)
  universal-config:
    type: file
    machine: [x86-box, arm-box]
    path: /etc/forjar-arch-test
    content: "arch={{machine.x86-box.arch}}"
    owner: root
    mode: "0644"

  # x86_64 only
  x86-driver:
    type: file
    machine: [x86-box, arm-box]
    path: /etc/x86-driver.conf
    content: "Intel GPU driver config"
    arch: [x86_64]

  # aarch64 only
  arm-firmware:
    type: file
    machine: [x86-box, arm-box]
    path: /etc/arm-firmware.conf
    content: "ARM firmware config"
    arch: [aarch64]

  # Multi-arch (x86_64 and aarch64)
  multi-arch-tool:
    type: file
    machine: [x86-box, arm-box]
    path: /etc/multi-arch-tool.conf
    content: "Runs on x86 and arm"
    arch: [x86_64, aarch64]
