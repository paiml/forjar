version: "1.0"
name: dogfood-age-secrets
description: "Dogfood: age-encrypted secrets — ENC[age,...] markers decrypted at resolve time"

params:
  app_name: myapp

machines:
  test-box:
    hostname: test-box
    addr: container
    user: root
    arch: x86_64
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-dogfood-age-secrets
      ephemeral: true
      privileged: false
      init: true

resources:
  # File with age-encrypted secrets inline
  # Run: forjar secrets keygen > identity.txt
  # Then: forjar secrets encrypt "sk-test-12345" -r <public-key>
  # Paste the ENC[age,...] marker into the content field
  api-config:
    type: file
    machine: test-box
    path: /etc/{{params.app_name}}/api.conf
    content: |
      # Managed by forjar — age-encrypted secrets
      # Decrypted from ENC[age,...] markers at apply time
      # Identity from FORJAR_AGE_KEY env var or --identity flag
      APP_NAME={{params.app_name}}
      API_KEY={{secrets.api-key}}
    owner: root
    mode: "0600"

  # Environment variable secrets still work (backward compat)
  db-config:
    type: file
    machine: test-box
    path: /etc/{{params.app_name}}/db.conf
    content: |
      DB_HOST=localhost
      DB_PASSWORD={{secrets.db-password}}
    owner: root
    mode: "0600"
    depends_on: [api-config]

policy:
  failure: stop_on_first
  tripwire: true
  lock_file: true
