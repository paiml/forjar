# Dogfood config: test secrets resolution in templates.
#
# Demonstrates {{secrets.KEY}} templates resolved from
# FORJAR_SECRET_<KEY> environment variables.
#
# Prerequisites:
#   docker build -t forjar-test-target -f tests/Dockerfile.test-target .
#
# Usage:
#   # Set secrets as env vars
#   export FORJAR_SECRET_API_KEY="my-api-key-123"
#   export FORJAR_SECRET_DB_PASSWORD="hunter2"
#
#   # Validate (secrets resolved during template expansion)
#   cargo run -- validate -f examples/dogfood-secrets.yaml
#
#   # Plan (view resolved content in --output-dir)
#   cargo run -- plan -f examples/dogfood-secrets.yaml \
#     --state-dir /tmp/dogfood-secrets --output-dir /tmp/secrets-scripts
#
#   # Inspect generated scripts
#   cat /tmp/secrets-scripts/api-config.apply.sh
#
#   # Apply
#   cargo run -- apply -f examples/dogfood-secrets.yaml \
#     --state-dir /tmp/dogfood-secrets
#
#   # Cleanup
#   docker rm -f forjar-dogfood-secrets

version: "1.0"
name: dogfood-secrets

machines:
  test-box:
    hostname: test-box
    addr: container
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-dogfood-secrets
      ephemeral: false
      privileged: false
      init: true

resources:
  api-config:
    type: file
    machine: test-box
    path: /etc/forjar/api.conf
    content: |
      # Managed by forjar — secrets dogfood test
      API_KEY={{secrets.api-key}}
      DB_PASSWORD={{secrets.db-password}}
    owner: root
    group: root
    mode: "0600"

policy:
  failure: stop_on_first
  tripwire: true
