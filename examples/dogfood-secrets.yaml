version: '1.0'
name: dogfood-secrets
description: "Tests secrets template interpolation for sensitive values like API keys and database passwords."
params: {}
machines:
  test-box:
    hostname: test-box
    addr: container
    user: root
    arch: x86_64
    ssh_key: null
    roles: []
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-dogfood-secrets
      ephemeral: false
      privileged: false
      init: true
    cost: 0
resources:
  api-config:
    type: file
    machine: test-box
    state: null
    depends_on: []
    provider: null
    packages: []
    version: null
    path: /etc/forjar/api.conf
    content: |
      # Managed by forjar — secrets dogfood test
      API_KEY={{secrets.api-key}}
      DB_PASSWORD={{secrets.db-password}}
    source: null
    target: null
    owner: root
    group: root
    mode: '0600'
    name: null
    enabled: null
    restart_on: []
    fstype: null
    options: null
    uid: null
    shell: null
    home: null
    groups: []
    ssh_authorized_keys: []
    system_user: false
    schedule: null
    command: null
    image: null
    ports: []
    environment: []
    volumes: []
    restart: null
    protocol: null
    port: null
    action: null
    from: null
    recipe: null
    inputs: {}
    arch: []
    tags: []
policy:
  failure: stop_on_first
  parallel_machines: false
  tripwire: true
  lock_file: true
  pre_apply: null
  post_apply: null
