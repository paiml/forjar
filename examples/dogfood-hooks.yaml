version: '1.0'
name: dogfood-hooks
description: "Demonstrates pre_apply and post_apply lifecycle hooks in the policy block."
params: {}
machines:
  test-box:
    hostname: test-box
    addr: container
    user: root
    arch: x86_64
    ssh_key: null
    roles: []
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-dogfood-hooks
      ephemeral: false
      privileged: false
      init: true
    cost: 0
resources:
  greeting:
    type: file
    machine: test-box
    state: null
    depends_on: []
    provider: null
    packages: []
    version: null
    path: /etc/forjar-greeting
    content: Hello from hooks dogfood!
    source: null
    target: null
    owner: root
    group: null
    mode: '0644'
    name: null
    enabled: null
    restart_on: []
    fstype: null
    options: null
    uid: null
    shell: null
    home: null
    groups: []
    ssh_authorized_keys: []
    system_user: false
    schedule: null
    command: null
    image: null
    ports: []
    environment: []
    volumes: []
    restart: null
    protocol: null
    port: null
    action: null
    from: null
    recipe: null
    inputs: {}
    arch: []
    tags: []
policy:
  failure: stop_on_first
  parallel_machines: false
  tripwire: true
  lock_file: true
  pre_apply: 'echo ''[hook] Pre-apply: validating config...'' && date'
  post_apply: 'echo ''[hook] Post-apply: apply finished at'' && date'
