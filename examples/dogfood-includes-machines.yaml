# FJ-254: Included machines file for dogfood-includes.yaml
version: "1.0"
name: included-machines
description: "Shared machine definitions included by dogfood-includes.yaml to test config merging."

params:
  region: us-east-1
  hostname: web-prod

machines:
  test-box:
    hostname: "{{ params.hostname }}"
    addr: container
    transport: container
    arch: x86_64
    roles: ["{{ params.region }}"]
    container:
      image: ubuntu:22.04

resources: {}
