# Recipe: sovereign-ai-stack — Complete sovereign AI lab deployment
#
# Meta-recipe that composes:
#   1. renacer-observability → monitoring machine (tracing + Grafana)
#   2. repartir-worker → worker machines (distributed execution)
#   3. apr-inference-server → GPU machines (model serving)
#
# This recipe deploys the coordination layer on the monitoring machine:
#   - Health check dashboard config
#   - Fleet inventory file
#   - Coordination cron job
#
# The sub-recipes are deployed via separate `type: recipe` resources
# in the forjar.yaml, each targeting different machines.
#
# Inputs:
#   model_source (string) — HuggingFace repo ID for the model
#   model_format (enum, default: gguf) — model file format
#   api_port (int, default: 8080) — inference API port
#   worker_port (int, default: 9000) — repartir worker port
#   grafana_port (int, default: 3000) — Grafana dashboard port
#   user (string, default: forjar) — coordination service account

recipe:
  name: sovereign-ai-stack
  version: "1.0"
  description: "Sovereign AI lab — GPU inference + distributed workers + observability"
  requires:
    - recipe: apr-inference-server
    - recipe: repartir-worker
    - recipe: renacer-observability
  inputs:
    model_source:
      type: string
      description: "Model source — HuggingFace repo ID or URL"
    model_format:
      type: enum
      choices: [gguf, safetensors, apr]
      default: gguf
    api_port:
      type: int
      default: 8080
      min: 1
      max: 65535
    worker_port:
      type: int
      default: 9000
      min: 1
      max: 65535
    grafana_port:
      type: int
      default: 3000
      min: 1
      max: 65535
    user:
      type: string
      default: forjar

resources:
  coord-user:
    type: user
    name: "{{inputs.user}}"
    shell: /bin/bash
    home: /opt/forjar-stack
    system_user: true
    depends_on: []

  coord-dir:
    type: file
    state: directory
    path: /opt/forjar-stack
    owner: "{{inputs.user}}"
    mode: "0755"
    depends_on: [coord-user]

  fleet-inventory:
    type: file
    path: /opt/forjar-stack/fleet.yaml
    content: |
      # Sovereign AI Stack Fleet Inventory
      # Auto-generated by forjar sovereign-ai-stack recipe
      stack:
        model_source: {{inputs.model_source}}
        model_format: {{inputs.model_format}}
        api_port: {{inputs.api_port}}
        worker_port: {{inputs.worker_port}}
        grafana_port: {{inputs.grafana_port}}
    owner: "{{inputs.user}}"
    mode: "0644"
    depends_on: [coord-dir]

  health-dashboard:
    type: file
    path: /opt/forjar-stack/health-check.sh
    content: |
      #!/bin/bash
      # Sovereign AI Stack Health Check
      set -euo pipefail
      echo "=== Sovereign AI Stack Health ==="
      echo "$(date -Iseconds)"
      echo ""
      echo "--- Inference API ---"
      curl -sf http://localhost:{{inputs.api_port}}/health && echo "OK" || echo "FAIL"
      echo ""
      echo "--- GPU Status ---"
      nvidia-smi --query-gpu=name,temperature.gpu,utilization.gpu,memory.used,memory.total --format=csv,noheader 2>/dev/null || echo "N/A"
      echo ""
      echo "--- Worker Status ---"
      curl -sf http://localhost:{{inputs.worker_port}}/status && echo "OK" || echo "N/A"
      echo ""
      echo "--- Observability ---"
      curl -sf http://localhost:{{inputs.grafana_port}}/api/health && echo "Grafana OK" || echo "Grafana FAIL"
    owner: "{{inputs.user}}"
    mode: "0755"
    depends_on: [coord-dir]

  health-cron:
    type: cron
    name: "sovereign-stack-health"
    schedule: "*/15 * * * *"
    command: "/opt/forjar-stack/health-check.sh >> /opt/forjar-stack/health.log 2>&1"
    user: "{{inputs.user}}"
    depends_on: [health-dashboard, fleet-inventory]
