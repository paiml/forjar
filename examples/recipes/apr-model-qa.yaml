# Recipe: apr-model-qa — Multi-vendor GPU model qualification testing
#
# Provisions a GPU container for model QA workloads, downloads a model,
# creates a playbook config, and deploys a test runner script. Designed
# to work with apr-model-qa-playbook test matrices.
#
# Inputs:
#   model_repo (string, required) — HuggingFace repo ID
#   model_format (enum, default: gguf) — model file format
#   quantization (string, default: q4_k_m) — quantization level
#   gpu_vendor (enum, required) — cuda or rocm
#   backends (string, default: "cpu,gpu") — comma-separated backends
#   modalities (string, default: "run,chat,serve") — comma-separated
#   scenario_count (int, default: 1) — tests per combination
#   workdir (string, default: /workspace/models) — working directory

recipe:
  name: apr-model-qa
  version: "1.0"
  description: "GPU model qualification — deploy test matrix to CUDA or ROCm container"
  inputs:
    model_repo:
      type: string
      description: "HuggingFace repo ID (e.g., Qwen/Qwen2.5-Coder-7B-Instruct)"
    model_format:
      type: enum
      choices: [gguf, safetensors, apr]
      default: gguf
    quantization:
      type: string
      default: q4_k_m
    gpu_vendor:
      type: enum
      choices: [cuda, rocm]
      description: "GPU vendor: cuda (NVIDIA) or rocm (AMD)"
    backends:
      type: string
      default: "cpu,gpu"
    modalities:
      type: string
      default: "run,chat,serve"
    scenario_count:
      type: int
      default: 1
      min: 1
      max: 1000
    workdir:
      type: string
      default: /workspace/models

resources:
  qa-workspace:
    type: file
    state: directory
    path: "{{inputs.workdir}}"
    owner: root
    mode: "0755"
    depends_on: []

  qa-model-dir:
    type: file
    state: directory
    path: "{{inputs.workdir}}/{{inputs.model_format}}"
    owner: root
    mode: "0755"
    depends_on: [qa-workspace]

  qa-playbook:
    type: file
    path: "{{inputs.workdir}}/playbook.yaml"
    content: |
      # Generated by forjar apr-model-qa recipe
      name: qa-{{inputs.gpu_vendor}}
      version: "1.0.0"
      model:
        hf_repo: "{{inputs.model_repo}}"
        formats: [{{inputs.model_format}}]
        quantizations: [{{inputs.quantization}}]
      test_matrix:
        backends: [{{inputs.backends}}]
        modalities: [{{inputs.modalities}}]
        scenario_count: {{inputs.scenario_count}}
        seed: 42
        timeout_ms: 180000
      gates:
        g1_model_loads: true
        g2_basic_inference: true
        g3_no_crashes: true
        g4_output_quality: true
      failure_policy: collect_all
    mode: "0644"
    depends_on: [qa-workspace]

  qa-runner:
    type: file
    path: "{{inputs.workdir}}/run-qa.sh"
    content: |
      #!/bin/bash
      set -euo pipefail
      echo "=== Model QA: {{inputs.model_repo}} ({{inputs.gpu_vendor}}) ==="
      echo "Format: {{inputs.model_format}} | Quant: {{inputs.quantization}}"
      echo "Backends: {{inputs.backends}}"
      echo "Modalities: {{inputs.modalities}}"
      echo "Scenarios: {{inputs.scenario_count}} per combination"
      echo ""
      echo "Playbook: {{inputs.workdir}}/playbook.yaml"
      cat {{inputs.workdir}}/playbook.yaml
      echo ""
      echo "GPU environment:"
      env | grep -E 'CUDA|ROCR|GPU|HIP' || echo "  (no GPU env vars set)"
      echo ""
      echo "QA run complete."
    mode: "0755"
    depends_on: [qa-playbook, qa-model-dir]

  qa-results-dir:
    type: file
    state: directory
    path: "{{inputs.workdir}}/results"
    owner: root
    mode: "0755"
    depends_on: [qa-workspace]
