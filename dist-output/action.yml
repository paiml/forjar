name: Setup forjar
description: "Install Rust-native Infrastructure as Code"
inputs:
  version:
    description: "Version to install (default: latest)"
    required: false
    default: "latest"
runs:
  using: composite
  steps:
    - name: Install forjar
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(curl -sSf https://api.github.com/repos/paiml/forjar/releases/latest | grep tag_name | cut -d'"' -f4)
        fi
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)  TARGET="x86_64-unknown-linux-gnu" ;;
          aarch64)  TARGET="aarch64-unknown-linux-gnu" ;;
          *) echo "Unsupported architecture: $ARCH"; exit 1 ;;
        esac
        VERSION_NUM="${VERSION#v}"
        curl -sSfL "https://github.com/paiml/forjar/releases/download/${VERSION}/forjar-${VERSION_NUM}-${TARGET}.tar.gz" | tar xz
        sudo mv forjar /usr/local/bin/
        forjar --version
