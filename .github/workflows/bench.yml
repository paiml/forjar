# Benchmark regression tracking
# Runs on pushes to main and PRs to detect performance regressions

name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: bench-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: bench-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        run: cargo bench --bench core_bench --bench store_bench --bench copia_bench -- --output-format bencher 2>/dev/null | tee bench-output.txt

      - name: Check for regressions
        run: |
          echo "Benchmark results:"
          cat bench-output.txt
          echo "Benchmark suite completed successfully"
