# Undefined behavior detection via Miri
# Runs on pushes to main and PRs to catch UB in unsafe code paths

name: Miri

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: miri-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  miri:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install nightly toolchain with Miri
        run: |
          rustup toolchain install nightly --component miri
          rustup override set nightly

      - name: Cache cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: miri-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Miri on core unit tests
        run: cargo +nightly miri test --lib -p forjar -- --test-threads=1
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
